name: Terraform CI

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-ci.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-ci.yml"

jobs:
  validate:
    name: Format & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive -diff

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Report-only for now (exit-code 0): this config intentionally exposes
      # sg-public-nat on 443 from 0.0.0.0/0 per the lab spec, which scanners
      # typically flag as HIGH. Review the first run's findings, then either
      # add a .trivyignore for accepted findings or flip exit-code to 1.
      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: terraform
          severity: CRITICAL,HIGH
          exit-code: 0
